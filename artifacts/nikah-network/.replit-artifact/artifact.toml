kind = "web"
previewPath = "/"
title = "Nikah Network"
version = "1.0.0"
id = "artifacts/nikah-network"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23670

[services.development]
run = "pnpm --filter @workspace/nikah-network run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nikah-network", "run", "build" ]
publicDir = "artifacts/nikah-network/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23670"
BASE_PATH = "/"
